# jetpack — compact, fast-feel, rocket emoji as the leading anchor.
# Inspired by the spirit of Starship's jetpack preset (informal, kinetic).
#
# To use: `cp jetpack.toml ~/.config/airterm/prompt.toml`

format = [
    "directory",
    "git_branch",
    "git_status",
    "command_duration",
    "status",
]

[directory]
truncation_length = 3
style = "bold cyan"
home_symbol = "🚀 ~"

[git_branch]
symbol = " "
style = "bold purple"

[git_status]
modified = "*"
ahead = "⇡"
behind = "⇣"
style = "yellow"

[command_duration]
min_time_ms = 500
style = "bold yellow"

[status]
style = "bold red"

[time]
disabled = true

[character]
success = "❯"
error = "❯"
success_style = "bold green"
error_style = "bold red"
