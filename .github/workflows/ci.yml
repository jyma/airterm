name: CI

on:
  push:
    branches: [main, master, redesign]
  pull_request:
    branches: [main, master, redesign]

jobs:
  ts:
    name: TypeScript (lint + typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Build first so workspace package types resolve when web typechecks
      # imports from @airterm/protocol / @airterm/crypto.
      - name: Build packages
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Typecheck (web)
        working-directory: apps/web
        run: pnpm exec tsc -b --noEmit

      - name: Tests
        run: pnpm test

  mac:
    name: macOS (swift build)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # GitHub-hosted macos-14 runners come with Xcode pre-installed,
      # which is what `swift build` needs to find the macOS SDK. The
      # MetalKit / AppKit / Foundation imports won't compile without it.
      - name: Show toolchain
        run: |
          xcrun --show-sdk-path
          swift --version

      - name: Resolve packages
        working-directory: apps/mac
        run: swift package resolve

      - name: Build
        working-directory: apps/mac
        run: swift build -c debug

      # `swift test` is intentionally not run here: AirTerm's dev box
      # doesn't have XCTest available under Command Line Tools, but
      # GitHub macos-14 does. Re-enable once the test target's
      # dependencies stabilise — for now the canonical contract tests
      # live in the TS workspace (Noise interop, takeover frames).
      # - name: Test
      #   working-directory: apps/mac
      #   run: swift test

  deploy-web:
    needs: ts
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm build:web

      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/web/dist --project-name=airterm
