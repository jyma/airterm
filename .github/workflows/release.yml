name: Release

# Triggered when the maintainer pushes a `v*` tag (e.g. `git tag v0.1.0
# && git push --tags`). The workflow builds a release-mode AirTerm.app +
# wraps it into a signed (ad-hoc) DMG, then attaches the DMG to a GitHub
# Release auto-created from the tag.
#
# Real Developer-ID signing + Apple notarization is intentionally NOT
# wired here — that needs a `APPLE_*` secret bundle the maintainer hasn't
# provisioned yet, and shipping an ad-hoc-signed DMG is fine for a
# closed alpha. A later `release-sign.yml` slice will add the
# `xcrun notarytool submit --wait` step once the secrets land.

on:
  push:
    tags:
      - 'v*'

permissions:
  # Required so `softprops/action-gh-release` can publish the release.
  contents: write

jobs:
  mac-dmg:
    name: Build + DMG (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: |
          xcrun --show-sdk-path
          swift --version
          rustc --version

      # Make sure both rustup targets exist before bundle.sh asks for them.
      # Pre-installed targets on macos-14 vary by image; this is a no-op
      # when they're already present.
      - name: Add Rust targets
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Bundle release .app (universal airprompt)
        run: bash apps/mac/scripts/bundle.sh --release

      - name: Wrap into DMG
        run: bash apps/mac/scripts/dmg.sh

      - name: Smoke-check the universal binary
        run: |
          lipo -archs apps/mac/build/AirTerm.app/Contents/Resources/bin/airprompt
          codesign --verify --verbose=2 apps/mac/build/AirTerm.app

      # GitHub Release name = the pushed tag; body left to the
      # maintainer to fill in via the release editor (or an
      # autogenerated release-notes job in a later slice).
      - name: Publish to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: apps/mac/build/AirTerm-*.dmg
          fail_on_unmatched_files: true
          generate_release_notes: true

      # Keep the DMG around as a workflow artifact too — useful when
      # debugging a build failure on a tag that's already been
      # consumed by the release publisher.
      - name: Upload DMG as workflow artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: AirTerm-dmg
          path: apps/mac/build/AirTerm-*.dmg
          if-no-files-found: error
          retention-days: 14
