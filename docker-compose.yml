services:
  relay:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required (min 32 chars)}
      - DB_PATH=/data/airterm.db
      - DB_ENCRYPTION_KEY=${DB_ENCRYPTION_KEY:-}
      - PAIR_CODE_TTL=${PAIR_CODE_TTL:-300}
      - DOMAIN=${DOMAIN:-relay.airterm.ai}
    volumes:
      - airterm-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>r.ok?process.exit(0):process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  airterm-data:
