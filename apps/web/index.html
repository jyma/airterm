<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
    <!-- Status-bar tint matches Catppuccin Mocha background so iOS Safari -->
    <!-- doesn't show a contrasting bar above the standalone PWA. -->
    <meta name="theme-color" content="#1E1E2E" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AirTerm" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>AirTerm</title>
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <!-- iOS still prefers a square apple-touch-icon over the manifest one. -->
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
