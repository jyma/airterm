<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e2e; }
  #terminal { width: 100%; height: 100%; }

  /* Catppuccin Mocha scrollbar */
  .xterm-viewport::-webkit-scrollbar { width: 8px; }
  .xterm-viewport::-webkit-scrollbar-track { background: transparent; }
  .xterm-viewport::-webkit-scrollbar-thumb {
    background: rgba(108, 112, 134, 0.4);
    border-radius: 4px;
  }
  .xterm-viewport::-webkit-scrollbar-thumb:hover {
    background: rgba(108, 112, 134, 0.7);
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/css/xterm.css">
</head>
<body>
<div id="terminal"></div>
<script src="https://cdn.jsdelivr.net/npm/@xterm/xterm@5.5.0/lib/xterm.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-fit@0.10.0/lib/addon-fit.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@xterm/addon-webgl@0.18.0/lib/addon-webgl.js"></script>
<script>
// Catppuccin Mocha theme
const theme = {
  background:   '#1E1E2E',
  foreground:   '#CDD6F4',
  cursor:       '#F5E0DC',
  cursorAccent: '#1E1E2E',
  selectionBackground: 'rgba(88, 91, 112, 0.5)',
  selectionForeground: '#CDD6F4',
  black:        '#45475A',
  red:          '#F38BA8',
  green:        '#A6E3A1',
  yellow:       '#F9E2AF',
  blue:         '#89B4FA',
  magenta:      '#CBA6F7',
  cyan:         '#94E2D5',
  white:        '#BAC2DE',
  brightBlack:  '#585B70',
  brightRed:    '#F38BA8',
  brightGreen:  '#A6E3A1',
  brightYellow: '#F9E2AF',
  brightBlue:   '#89B4FA',
  brightMagenta:'#CBA6F7',
  brightCyan:   '#94E2D5',
  brightWhite:  '#A6ADC8',
};

const term = new Terminal({
  theme: theme,
  fontFamily: "'SFMono-Regular', 'SF Mono', Menlo, Monaco, 'Courier New', monospace",
  fontSize: 13,
  fontWeight: 'normal',
  fontWeightBold: 'bold',
  lineHeight: 1.2,
  letterSpacing: 0,
  cursorBlink: true,
  cursorStyle: 'block',
  scrollback: 10000,
  allowProposedApi: true,
  macOptionIsMeta: true,
  macOptionClickForcesSelection: true,
});

const fitAddon = new FitAddon.FitAddon();
term.loadAddon(fitAddon);

// Try WebGL, fallback to canvas
try {
  const webglAddon = new WebglAddon.WebglAddon();
  webglAddon.onContextLoss(() => { webglAddon.dispose(); });
  term.loadAddon(webglAddon);
} catch (e) {
  console.log('WebGL not available, using canvas renderer');
}

term.open(document.getElementById('terminal'));
fitAddon.fit();

// Resize handling — multiple triggers for reliability
let resizeTimeout = null;
function handleResize() {
  clearTimeout(resizeTimeout);
  resizeTimeout = setTimeout(() => {
    fitAddon.fit();
    const dims = fitAddon.proposeDimensions();
    if (dims) {
      window.webkit.messageHandlers.resize.postMessage({
        cols: dims.cols,
        rows: dims.rows
      });
    }
  }, 50); // debounce 50ms
}

// ResizeObserver on the terminal container
const resizeObserver = new ResizeObserver(handleResize);
resizeObserver.observe(document.getElementById('terminal'));

// Also listen on window resize (catches WKWebView frame changes)
window.addEventListener('resize', handleResize);

// Forward keyboard input to Swift
term.onData((data) => {
  window.webkit.messageHandlers.input.postMessage(data);
});

// Binary data from terminal (for mouse events etc.)
term.onBinary((data) => {
  window.webkit.messageHandlers.input.postMessage(data);
});

// API for Swift to call
window.termWrite = (data) => {
  term.write(data);
};

window.termResize = (cols, rows) => {
  term.resize(cols, rows);
};

window.termFocus = () => {
  term.focus();
};

// Notify Swift that terminal is ready
window.webkit.messageHandlers.ready.postMessage({
  cols: term.cols,
  rows: term.rows
});
</script>
</body>
</html>
